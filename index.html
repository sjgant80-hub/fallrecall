(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;
      if (!m || !m.kind || m.peerId === seedId) return;
      if (opts.onMessage) opts.onMessage(m);
    };
    STATE.mesh.bc.postMessage({ kind: 'fall-kit:hello', peerId: seedId, ts: Date.now(), seedName: opts.seedName || 'unknown' });
    STATE.mesh.active = true;
    notify('Mesh active · channel ' + MESH_CHANNEL, 'ok');
  }
  function meshPost(kind, payload) {
    if (!STATE.mesh.active || !STATE.mesh.bc) return false;
    STATE.mesh.bc.postMessage({ kind: kind, peerId: STATE.mesh.seedId, ts: Date.now(), payload: payload });
    return true;
  }

    t.textContent = msg;
    t.style.background = kind === 'err' ? '#a14a2a' : kind === 'ok' ? '#6b8d4a' : '#c08a3a';

    t.style.transform = 'translateX(-50%) translateY(0)';

  // ─── KCC Mint launcher (v1.2 · fork-this-seed shortcut) ──────────
  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();
    const name = document.title.replace(/^[◊·\s]+/, '').split('·')[0].trim() || slug;
    const url = location.href.split('?')[0].split('#')[0];
    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });
    window.open(KCC_MINT_URL + '?' + params.toString(), '_blank', 'noopener');
  }

  // ─── Init ────────────────────────────────────────────────────────
  function init(opts) {
    opts = opts || {};
    injectCss();
    if (opts.seedName) STATE.config.seedName = opts.seedName;
    if ($('#fk-ai-chip')) { renderAiChip(); return { version: FALL_KIT_VERSION, mounted: false }; }

    if (anchor) { anchor.appendChild(chip); }
    else {
      chip.style.cssText += ';position:fixed;bottom:14px;left:14px;z-index:9998;box-shadow:0 4px 14px rgba(0,0,0,.4)';
      document.body.appendChild(chip);

    if (!$('#fk-mint-btn') && !opts.hideMint) {

      mintBtn.onmouseover = () => { mintBtn.style.background = '#c08a3a'; mintBtn.style.color = '#0a0a0a'; };
      mintBtn.onmouseout  = () => { mintBtn.style.background = 'rgba(10,10,15,.7)'; mintBtn.style.color = '#c08a3a'; };
      mintBtn.onclick = openMint;
      document.body.appendChild(mintBtn);
    }
    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };
  }

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,
    init: init,
    aiTier: aiTier,
    aiComplete: aiComplete,
    loadWebLLM: loadWebLLM,
    openSettings: openSettings,

    MODELS: WEBLLM_MODELS,
    PROVIDERS: T3_PROVIDERS,
    state: STATE,
  };
})(typeof window !== 'undefined' ? window : globalThis);

let db;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(IDB_NAME, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('config'))         d.createObjectStore('config');
      if (!d.objectStoreNames.contains('conversations')) d.createObjectStore('conversations', { keyPath:'id' });
      if (!d.objectStoreNames.contains('memories'))      d.createObjectStore('memories',      { keyPath:'id' });
      if (!d.objectStoreNames.contains('profile'))       d.createObjectStore('profile');
      if (!d.objectStoreNames.contains('prompts'))       d.createObjectStore('prompts',       { keyPath:'id' });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = rej;
  });
}
function idbGet(s, k) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).get(k); q.onsuccess=()=>r(q.result); }); }
function idbGetAll(s) { return new Promise(r => { const tx=db.transaction(s,'readonly'); const q=tx.objectStore(s).getAll(); q.onsuccess=()=>r(q.result||[]); }); }
function idbPut(s, v, k) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const o=tx.objectStore(s); const q=k!=null?o.put(v,k):o.put(v); q.onsuccess=()=>r(true); }); }
function idbDelete(s, k) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const q=tx.objectStore(s).delete(k); q.onsuccess=()=>r(true); }); }
function idbClear(s) { return new Promise(r => { const tx=db.transaction(s,'readwrite'); const q=tx.objectStore(s).clear(); q.onsuccess=()=>r(true); }); }

async function sha256Hex(input) {
  const buf = new TextEncoder().encode(typeof input === 'string' ? input : JSON.stringify(input));
  const h = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,'0')).join('');
}
let chainHead = '0'.repeat(64);
async function chainNext(payload) {
  const prev = chainHead;
  const hash = await sha256Hex(prev + ':' + JSON.stringify(payload) + ':' + now());
  chainHead = hash; await idbPut('config', hash, 'chainHead');
  return { prevHash: prev, hash };
}
async function loadChainHead() { const h = await idbGet('config', 'chainHead'); if (h) chainHead = h; }

async function loadAll() {

}

window.__fellowSeeds = window.__fellowSeeds || new Map();

function __pruneFellowSeeds(maxAgeMs) {

function initMesh() {
  try {
    __sigChan = new BroadcastChannel('fall-signal');
    __sigChan.postMessage({ type:'hello', ...__seedSelfInfo() });
    __sigChan.onmessage = async (e) => {
      const m = e.data||{}; if (!m.type) return;
      const self = 'fallrecall';
      if (m.type === 'hello' || m.type === 'pong') {
        if (!m.source || m.source === self) return;
        const ex = window.__fellowSeeds.get(m.source) || {};
        window.__fellowSeeds.set(m.source, { ...ex, ...m, lastSeen: Date.now() });
        if (state.active === 'inspect' || state.active === 'mesh') try { render(); } catch(e) {}
      } else if (m.type === 'ping') {
        try { __sigChan.postMessage({ type:'pong', ...__seedSelfInfo() }); } catch(e) {}
      } else if (m.type === 'request' && (m.to === self || m.to === '*') && m.from !== self) {
        const handler = window.__crossSeedHandlers[m.kind]; if (!handler) return;
        try { const result = await handler(m.payload||{}); __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:result, reqId:m.reqId }); }
        catch (err) { __sigChan.postMessage({ type:'response', kind:m.kind, from:self, to:m.from, payload:{error:err.message}, reqId:m.reqId }); }
      } else if (m.type === 'response' && m.to === self) {
        const p = window.__crossSeedPending.get(m.reqId);
        if (p) { clearTimeout(p.timer); p.resolve(m.payload); window.__crossSeedPending.delete(m.reqId); }
      }

function trace(msg, level) {

async function cascadeChat(prompt, opts) {
  opts = opts || {};
  const onChunk = opts.onChunk || (()=>{});
  const system = opts.system || 'You are a precise analyser. Output exactly what is asked, no preamble, no apologies.';
  const elig = eligibleProviders();
  if (!elig.length) throw new Error('No providers enabled. Configure one in LLM Providers.');
  trace(`cascade starting · ${elig.length} eligible`);
  let lastErr = null;
  for (const p of elig) {
    trace(`→ trying ${p.name} (${p.tier})`);
    try {
      const out = await callProvider(p, system, prompt, onChunk);
      trace(`✓ ${p.name} returned ${out.length} chars`, 'ok');
      state.usage[p.id].calls++; state.usage[p.id].totalIn += (system+prompt).length; state.usage[p.id].totalOut += out.length; state.usage[p.id].lastUsed = now();
      await persistUsage();
      return { provider:p.id, text:out };
    } catch (e) { trace(`✗ ${p.name}: ${e.message}`, 'fail'); lastErr = e; }
  }
  throw new Error('All providers failed. Last: ' + (lastErr?.message || 'unknown'));
}
async function callProvider(p, system, prompt, onChunk) {
  const cfg = state.providerConfig[p.id]||{}; const model = cfg.customModel || p.model;
  if (p.id === 'webllm') {
    if (state.webllmStatus !== 'ready') throw new Error('WebLLM not loaded');
    const reply = await state.webllmEngine.chat.completions.create({ messages:[{role:'system',content:system},{role:'user',content:prompt}], stream:true });
    let acc=''; for await (const chunk of reply) { const d=chunk.choices[0]?.delta?.content||''; acc+=d; onChunk(d); } return acc;
  }
  if (p.id === 'google') {
    const url = p.endpoint + '?alt=sse&key=' + encodeURIComponent(cfg.key);
    const body = { systemInstruction:{parts:[{text:system}]}, contents:[{role:'user',parts:[{text:prompt}]}], generationConfig:{temperature:0.4,maxOutputTokens:4096} };
    const r = await fetch(url, { method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body) });
    if (!r.ok) throw new Error('Google ' + r.status);
    return await streamSSE(r, onChunk, 'google');
  }
  if (p.id === 'anthropic') {
    const r = await fetch(p.endpoint, { method:'POST', headers:{'content-type':'application/json','x-api-key':cfg.key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}, body:JSON.stringify({ model, max_tokens:4096, stream:true, system, messages:[{role:'user',content:prompt}] }) });
    if (!r.ok) throw new Error('Anthropic ' + r.status);
    return await streamSSE(r, onChunk, 'anthropic');
  }
  const headers = { 'content-type':'application/json' };
  if (cfg.key) headers['authorization'] = 'Bearer ' + cfg.key;
  const r = await fetch(p.endpoint, { method:'POST', headers, body:JSON.stringify({ model, messages:[{role:'system',content:system},{role:'user',content:prompt}], stream:true, temperature:0.4 }) });
  if (!r.ok) throw new Error(p.name + ' ' + r.status + ': ' + (await r.text()).slice(0,160));
  return await streamSSE(r, onChunk, 'openai');
}
async function streamSSE(response, onChunk, kind) {
  const reader = response.body.getReader(); const dec = new TextDecoder();
  let buf='', acc='';
  while(true) {
    const {value,done} = await reader.read(); if (done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split(/\r?\n/); buf = lines.pop()||'';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const data = line.slice(6).trim(); if (data === '[DONE]') continue;
      try {
        const j = JSON.parse(data); let d='';
        if (kind === 'anthropic') { if (j.type === 'content_block_delta') d = j.delta?.text||''; }
        else if (kind === 'google') { d = j.candidates?.[0]?.content?.parts?.[0]?.text||''; }
        else { d = j.choices?.[0]?.delta?.content||''; }
        if (d) { acc+=d; onChunk(d); }
      } catch(e) {}
    }
  }
  return acc;
}

// ChatGPT data export: conversations.json — array of {title, create_time, mapping:{node_id:{id,message:{author:{role},content:{parts:[]}}}}}
function parseChatGPT(text) {
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('Not valid JSON. ChatGPT export should be the conversations.json file.'); }
  if (!Array.isArray(data)) {
    if (data.conversations && Array.isArray(data.conversations)) data = data.conversations;
    else throw new Error('Expected array of conversations.');
  }
  const out = [];
  for (const conv of data) {
    if (!conv.mapping) continue;
    const messages = [];
    const ids = Object.keys(conv.mapping);
    // Walk the tree in chronological order
    const sorted = ids.map(id => conv.mapping[id]).filter(n => n.message && n.message.content);
    sorted.sort((a,b) => (a.message?.create_time||0) - (b.message?.create_time||0));
    for (const node of sorted) {
      const m = node.message;
      const role = m.author?.role || 'unknown';
      if (role === 'system' || role === 'tool') continue;
      let content = '';
      if (m.content?.parts) content = m.content.parts.filter(p => typeof p === 'string').join('\n').trim();
      else if (typeof m.content === 'string') content = m.content;
      if (!content) continue;
      messages.push({ role, content, ts: (m.create_time||0)*1000 });
    }
    if (messages.length) {
      out.push({ id: uid('cgpt'), source: 'chatgpt', title: conv.title || '(untitled)', messages, importedAt: now(), originalCreatedAt: (conv.create_time||0)*1000 });
    }
  }
  return out;
}

// Claude conversation JSON — single conv or array
function parseClaude(text) {
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('Not valid JSON.'); }
  if (!Array.isArray(data)) data = [data];
  const out = [];
  for (const conv of data) {
    const messages = [];
    const arr = conv.chat_messages || conv.messages || [];
    for (const m of arr) {
      const role = m.sender === 'human' || m.role === 'user' ? 'user' : m.role || 'assistant';
      let content = '';
      if (typeof m.text === 'string') content = m.text;
      else if (typeof m.content === 'string') content = m.content;
      else if (Array.isArray(m.content)) content = m.content.map(c => typeof c === 'string' ? c : (c.text||'')).join('\n');
      if (content.trim()) messages.push({ role, content: content.trim(), ts: new Date(m.created_at||m.ts||0).getTime() || 0 });
    }
    if (messages.length) {
      out.push({ id: uid('clde'), source: 'claude', title: conv.name || conv.title || '(untitled Claude conv)', messages, importedAt: now(), originalCreatedAt: new Date(conv.created_at||0).getTime() || 0 });
    }
  }
  return out;
}

// Gemini / Google Takeout: 'MyActivity.html' is HTML; users can also paste plain text
function parseGemini(text) {
  // Try JSON first
  try {
    const data = JSON.parse(text);
    if (Array.isArray(data)) {
      // Array of activity items: { title, time, products:['Gemini'], queryText }
      const out = [];
      let currentConv = null;
      for (const item of data) {
        if (item.queryText || item.title) {
          if (!currentConv) {
            currentConv = { id: uid('gem'), source: 'gemini', title: 'Gemini activity ' + new Date(item.time||0).toLocaleDateString(), messages: [], importedAt: now(), originalCreatedAt: new Date(item.time||0).getTime() || 0 };
          }
          currentConv.messages.push({ role: 'user', content: item.queryText || item.title, ts: new Date(item.time||0).getTime() || 0 });
        }
      }
      if (currentConv && currentConv.messages.length) out.push(currentConv);
      return out;
    }
  } catch(e) {}
  // Fallback: parse as alternating User:/Gemini: text blocks
  return parseGeneric(text, 'gemini');
}

// Generic — try plain alternating role markers
function parseGeneric(text, source) {
  source = source || 'generic';
  const lines = text.split(/\r?\n/);
  const messages = [];
  let currentRole = null, currentContent = [];
  const roleRe = /^(user|you|human|assistant|claude|chatgpt|gpt|gemini|ai|bot)\s*[:>]?\s*/i;
  for (const line of lines) {
    const m = line.match(roleRe);
    if (m) {
      if (currentRole && currentContent.length) {
        messages.push({ role: currentRole, content: currentContent.join('\n').trim(), ts: 0 });
      }
      const r = m[1].toLowerCase();
      currentRole = (r === 'user' || r === 'you' || r === 'human') ? 'user' : 'assistant';
      currentContent = [line.slice(m[0].length)];
    } else if (currentRole) {
      currentContent.push(line);
    }
  }
  if (currentRole && currentContent.length) {
    messages.push({ role: currentRole, content: currentContent.join('\n').trim(), ts: 0 });
  }
  return messages.length ? [{ id: uid('gen'), source, title: 'Generic import · ' + new Date().toLocaleDateString(), messages, importedAt: now(), originalCreatedAt: 0 }] : [];
}

window.runAnalysis = async function() {
  const convs = await idbGetAll('conversations');
  if (!convs.length) { toast('import some conversations first', true); return; }
  // Build a corpus of just user messages (to keep token count manageable)
  const corpus = [];
  for (const c of convs) {
    for (const m of c.messages) {
      if (m.role === 'user' && m.content) corpus.push(m.content);
    }
  }
  // Sample if huge (avoid hitting context limits)
  let sample = corpus;
  const MAX_CHARS = 60000;
  if (corpus.join('\n').length > MAX_CHARS) {
    // Take a stratified sample: 1st 25%, last 25%, random 50% from middle
    const total = corpus.length;
    sample = [
      ...corpus.slice(0, Math.floor(total*0.15)),
      ...corpus.slice(-Math.floor(total*0.15))
    ];
    // Random middle fill until we hit budget
    const middle = corpus.slice(Math.floor(total*0.15), -Math.floor(total*0.15));
    while (sample.join('\n').length < MAX_CHARS && middle.length) {
      const idx = Math.floor(Math.random() * middle.length);
      sample.push(middle.splice(idx, 1)[0]);
    }
  }
  const userCorpus = sample.join('\n---\n');
  const system = `You analyse a person's communication corpus and return a structured flavour profile as STRICT JSON. No preamble, no markdown fences. Output starts with { and ends with }.`;
  const prompt = `Analyse the user-side messages below from a person's AI chat history. Return JSON with these exact keys:
{
  "voiceNotes": ["string", ...],         // 5-10 bullets describing how they write (sentence length, tone, hedging vs. assertion, humour, formality)
  "recurringInterests": ["string", ...], // 5-10 topics they return to
  "preferences": ["string", ...],         // 5-10 things they explicitly like / want
  "antiPreferences": ["string", ...],     // 5-10 things they bristle at / explicitly avoid
  "openQuestions": ["string", ...],       // 3-7 questions they keep asking in different forms
  "decisionStyle": "string",              // 1 paragraph on how they make decisions
  "summary": "string"                     // 2-3 sentence profile summary
}

Be specific. Avoid generic platitudes. Use evidence-based observations only — don't infer beyond what the corpus shows. If the corpus is sparse, say so in summary.

CORPUS:
${userCorpus}

OUTPUT (JSON only):`;
  const out = $('#analyseOutput'); out.className = 'preview-area streaming'; out.textContent = '';
  toast('analysing ' + sample.length + ' messages…');
  try {
    const res = await cascadeChat(prompt, { system, onChunk: d => { out.textContent += d; out.scrollTop = out.scrollHeight; } });
    out.className = 'preview-area';
    // Parse JSON
    const m = res.text.match(/\{[\s\S]*\}/);
    if (!m) { toast('analyser did not return JSON · raw output kept', true); return; }
    let profile;
    try { profile = JSON.parse(m[0]); } catch(e) { toast('JSON parse failed: ' + e.message, true); return; }
    profile.analysedAt = now();
    profile.providerUsed = res.provider;
    profile.messagesAnalysed = sample.length;
    profile.totalMessages = corpus.length;
    const ch = await chainNext({kind:'profile.analyse', provider:res.provider, n:sample.length});
    profile.prevHash = ch.prevHash; profile.hash = ch.hash;
    await idbPut('profile', profile, 'current');
    toast('✓ profile saved · view in Profile tab');
    setTimeout(() => switchTab('profile'), 600);
  } catch (e) {
    out.className = 'preview-area';
    out.textContent = '✗ ' + e.message;
  }
};

window.regenerate = async function(format) {

    'system-long': `Generate a comprehensive markdown system prompt that captures this person's flavour. Include sections: Identity, Voice & Tone, Recurring Interests, What They Want, What They Don't Want, Decision Style, Open Questions Worth Probing. ~500-800 words. The prompt should be addressed to an AI assistant in the second person ("You are helping..."). Output ONLY the system prompt, no preamble.`,
    'system-short': `Generate a tight, copy-paste system prompt under 200 words capturing this person's flavour. Single paragraph or short paragraphs. Action-oriented (telling the AI what to do, not just describing the user). Output ONLY the prompt.`,
    'voice-notes': `Generate pure bullet-point voice notes for this person. Each bullet is one short sentence. Categories: voice (tone/sentence-style), interests (topics), preferences (do X), anti-prefs (avoid Y). Output ONLY the bullets, with category headers.`,

  };

  if (out) { out.textContent = ''; out.classList.add('streaming'); }

window.doReplay = async function() {

  const c = (await idbGetAll('conversations')).find(x => x.id === id);

  if (mode === 'last-user') {
    const lastUser = [...c.messages].reverse().find(m => m.role === 'user');

    prompt = lastUser.content;

    prompt = c.messages.map(m => (m.role === 'user' ? 'USER: ' : 'ASSISTANT: ') + m.content).join('\n\n');
    prompt += '\n\n---\nContinue the conversation as the assistant would.';

  const out = $('#replayOutput'); out.className = 'preview-area streaming'; out.textContent = '';
  toast('replaying · ' + (useFlavour?'with':'without') + ' flavour');
  try {
    await cascadeChat(prompt, { system, onChunk: d => { out.textContent += d; out.scrollTop = out.scrollHeight; } });

  const peers = Array.from(window.__fellowSeeds?.values?.()||[]);
  main.innerHTML = `
    <div class="section-h"><h2>Mesh</h2><div class="sub">${peers.length} fellow seed${peers.length===1?'':'s'} online · fall-signal protocol</div></div>
    <div class="banner-attack"><strong>Cross-seed flavour:</strong> any FallSeed on this origin can request your flavour profile from fallrecall via the mesh. fallseed-agents uses it to tune system prompts. fallseed-creator-os uses it to inform journal prompts. Your flavour, your seeds, your data — all on your device.</div>
    <div class="card">
      <h3>Fellow seeds online</h3>
      ${peers.length ? `<div style="font-family:var(--mono);font-size:12px">
        ${peers.sort((a,b) => (a.source||'').localeCompare(b.source||'')).map(p => `<div style="padding:8px 0;border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center">
          <div><span style="color:var(--brass);font-weight:600">${esc(p.source||'?')}</span><div style="font-size:10px;color:var(--cream-muted);letter-spacing:.06em;margin-top:3px">prime ${esc(String(p.prime||'?'))} · v${esc(String(p.version||'?'))} · level ${esc(String(p.level??'?'))}${p.mesh?' · '+esc(p.mesh):''}</div></div>
          <button class="btn sm" onclick="pingPeer('${esc(p.source||'')}')">introspect →</button>
        </div>`).join('')}
      </div>` : '<div class="empty-state">no fellow seeds detected · open another FallSeed in this browser to see it appear here</div>'}
    </div>
    <div class="card">
      <h3>Exposed handlers</h3>
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Any peer can send these requests over fall-signal:</p>
      <ul style="list-style:none;padding:0;font-family:var(--mono);font-size:12px;color:var(--cream-dim)">
        <li style="padding:6px 0;border-bottom:1px solid var(--line-soft)">◇ <span style="color:var(--brass)">introspect</span> — returns manifest + peer count</li>
        <li style="padding:6px 0;border-bottom:1px solid var(--line-soft)">◇ <span style="color:var(--brass)">records-export</span> — returns named stores (profile, prompts, memories, conversations)</li>
        <li style="padding:6px 0">◇ <span style="color:var(--brass)">flavour-summary</span> — returns the analysed profile + short system prompt</li>
      </ul>
    </div>
  `;
}
window.pingPeer = async function(target) {
  if (!target) return;
  toast('introspecting ' + target + '…');
  try {
    const res = await crossSeedRequest(target, 'introspect', {}, { timeoutMs: 3000 });
    const body = `<div class="preview-area">${esc(JSON.stringify(res, null, 2))}</div>`;
    openModal('introspect: ' + target, body);
  } catch (e) { toast('failed: ' + e.message, true); }
};

async function crossSeedRequest(target, kind, payload, opts) {
  opts = opts || {}; const reqId = 'r_' + Math.random().toString(36).slice(2,12);
  return new Promise((resolve,reject) => {
    const timer = setTimeout(()=>{ window.__crossSeedPending.delete(reqId); reject(new Error('timeout')); }, opts.timeoutMs||3000);
    window.__crossSeedPending.set(reqId, { resolve, reject, timer });
    try { __sigChan.postMessage({ type:'request', kind, from:'fallrecall', to:target, payload, reqId }); }
    catch(e) { clearTimeout(timer); window.__crossSeedPending.delete(reqId); reject(e); }
  });
}
window.crossSeedRequest = crossSeedRequest;

    <div class="banner-attack"><strong>Sovereign first:</strong> defaults prioritise WebLLM (in-browser) > ollama (local) > LM Studio (local) > free cloud > paid. If you load a local model your conversations never leave your device, even during analysis.</div>

        const cfg = state.providerConfig[p.id]||{};

      }).join('')}

    <div class="card"><h3>WebLLM</h3><button class="btn brass sm" id="loadWebllm">${state.webllmStatus==='ready'?'✓ ready':state.webllmStatus==='loading'?'loading…':'load model'}</button><span id="webllmMsg" style="margin-left:10px;font-size:11px;color:var(--cream-muted)"></span></div>
  `;

window.toggleProvider = async function(id) { state.providerConfig[id].enabled = !state.providerConfig[id].enabled; await persistProviderConfig(); render(); };
window.setProviderKey = async function(id, key) { state.providerConfig[id].key = key; await persistProviderConfig(); };
async function loadWebLLM() {
  state.webllmStatus = 'loading'; $('#webllmMsg').textContent = 'loading…';
  try {
    const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');
    state.webllmEngine = await CreateMLCEngine('Llama-3.2-3B-Instruct-q4f16_1-MLC', { initProgressCallback: r => { const m=$('#webllmMsg'); if(m) m.textContent = r.text||'loading…'; } });
    state.webllmStatus = 'ready'; $('#webllmMsg').textContent = '✓ loaded';
  } catch (e) { state.webllmStatus = 'unloaded'; $('#webllmMsg').textContent = '✗ ' + e.message; }
}

function renderSettings(main) {
  main.innerHTML = `
    <div class="section-h"><h2>Settings</h2></div>
    <div class="card">
      <h3>Export / import</h3>
      <p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Export everything (conversations + profile + prompts + memories + config + chain).</p>
      <div style="display:flex;gap:8px"><button class="btn brass sm" onclick="exportAll()">⬇ export JSON</button><button class="btn sm" onclick="document.getElementById('impFileSet').click()">⬆ import JSON</button><input id="impFileSet" type="file" accept=".json" style="display:none" onchange="importAll(this.files[0])"></div>
    </div>
    <div class="card"><h3>Wipe</h3><p style="font-size:12px;color:var(--cream-dim);margin-bottom:10px">Removes every record. Cannot be undone.</p><button class="btn danger sm" onclick="wipeAll()">⚠ wipe everything</button></div>
  `;
}
window.exportAll = async function() {
  const b = { tool:TOOL_INFO, config:{providerConfig:state.providerConfig, chainHead}, conversations:await idbGetAll('conversations'), memories:await idbGetAll('memories'), profile:await idbGet('profile','current'), prompts:await idbGetAll('prompts'), exportedAt:now() };
  const blob = new Blob([JSON.stringify(b,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='fallrecall-export-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('exported');
};
window.importAll = async function(file) {
  if (!file) return;
  try {
    const b = JSON.parse(await file.text());
    if (b.config) { state.providerConfig = b.config.providerConfig||{}; chainHead = b.config.chainHead||chainHead; await persistProviderConfig(); await idbPut('config', chainHead, 'chainHead'); }
    for (const st of ['conversations','memories','prompts']) { await idbClear(st); for (const r of (b[st]||[])) await idbPut(st, r); }
    if (b.profile) await idbPut('profile', b.profile, 'current');
    toast('imported'); render();
  } catch (e) { toast('import failed: '+e.message, true); }
};
window.wipeAll = async function() {
  if (!confirm('Wipe every record?')) return;
  for (const st of ['conversations','memories','prompts']) await idbClear(st);
  await idbClear('profile');
  chainHead = '0'.repeat(64); await idbPut('config', chainHead, 'chainHead');
  toast('wiped'); render();
};

<!-- ═══════════════════════ AUTOPILOT · fall-autopilot-kit ═══════════════════════ -->
<script type="module">
  try {
    const { installAutopilot } = await import('https://sjgant80-hub.github.io/fall-autopilot-kit/src/autopilot.js');
    const manifestRes = await fetch('https://sjgant80-hub.github.io/fall-autopilot-kit/manifests/fallrecall.json');
    const manifest = await manifestRes.json();
    manifest.actions = manifest.actions.map(a => ({ ...a, run: async (params) => {
      const fn = window._app?.[a.id];
      if (typeof fn === 'function') return fn(params);
      alert('Autopilot proposes: ' + a.name + ' · params: ' + JSON.stringify(params) + '\n\nThis tool has not yet implemented the ' + a.id + ' handler. Proposal logged to audit.');
      return { stub: true, action: a.id, params };
    }}));
    manifest.state = () => ({ ...(window._app || {}), now: new Date().toISOString() });
    installAutopilot(manifest);
  } catch (e) { console.warn('[autopilot] init failed:', e); }
</script>
